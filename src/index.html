<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>VOIDMASKS - 100% On-Chain Schizocore NFTs on Stacks</title>
    
    <!-- SEO Meta Tags -->
    <meta name="description" content="Phase-8 schizocore PFP collection with 100% on-chain SVG generation. Built with Clarity 4 on Stacks.">
    
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>_VOIDmasks_</h1>
            <p class="subtitle"> on-chain NFT collection with <span class="clarity-highlight">Clarity 4</span></p>
            <div class="network-controls">
                <button id="network-badge" class="network-badge" title="Click to switch network"></button>
                <a id="faucet-link" href="https://stacks-jar.vercel.app" target="_blank" rel="noopener noreferrer" class="faucet-link hidden">🚰 Faucet</a>
            </div>
        </header>

        <div class="wallet-section">
            <button id="connect-wallet" class="btn-primary">Connect Wallet</button>
            <div id="wallet-info" class="wallet-info hidden">
                <span id="wallet-address"></span>
                <button id="disconnect-wallet" class="btn-secondary">Disconnect</button>
            </div>
        </div>

        <div class="mint-section">
            <h2>Mint Your Mask</h2>
            
            <!-- NEW: Progress Bar -->
            <div class="mint-stats">
                <div class="mint-progress-bg">
                    <div id="supply-progress" class="mint-progress-fill"></div>
                </div>
                <p class="supply-text"><span class="supply-count">0 / 10000</span> Minted</p>
            </div>

            <button id="mint-btn" class="btn-mint" disabled>Mint NFT</button>
            <p class="price-info">Cost: <span id="mint-price">Free</span></p>
            <p class="mint-info">One free mint per address • 10,000 max supply</p>
        </div>

        <div class="gallery-section">
            <h2>Your Collection</h2>
            <div id="collection-container" class="collection-grid">
                <!-- Collection items will be rendered here -->
            </div>
        </div>

        <div class="explorer-section">
            <h2>Token Explorer</h2>
            <div class="token-input">
                <input type="number" id="token-id-input" placeholder="Enter Token ID" min="1" max="10000" aria-label="Token ID">
                <button id="view-token-btn" class="btn-secondary">View Token</button>
            </div>
            <div id="token-display" class="token-display hidden">
                <!-- Token SVG will be displayed here -->
            </div>
        </div>

        <footer>
            <p>Built on <strong>Stacks</strong> • Secured by <strong>Bitcoin</strong></p>
        </footer>
    </div>

    <!-- NEW: Toast Notifications Container -->
    <div id="toast-container" class="toast-container"></div>

    <script type="module" src="main.js"></script>
</body>

</html>
